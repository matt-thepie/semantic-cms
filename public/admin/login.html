<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Semantic CMS</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="login-page">
  <main class="login-box">
    <h1>Semantic CMS</h1>

    <p id="login-error" class="error-message" hidden></p>

    <!-- Google sign-in (shown when configured) -->
    <a id="google-btn" href="/api/auth/google" class="btn google-btn" hidden>
      <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92a8.78 8.78 0 0 0 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.34A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.97 10.72a5.4 5.4 0 0 1 0-3.44V4.94H.96a9 9 0 0 0 0 8.12l3.01-2.34z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A9 9 0 0 0 .96 4.94l3.01 2.34C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
      Sign in with Google
    </a>

    <p id="or-divider" class="login-or" hidden>or</p>

    <!-- Password fallback (shown when a password is set) -->
    <form id="login-form" hidden>
      <div class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password">
      </div>
      <button type="submit" class="btn btn-ghost">Sign in with password</button>
    </form>
  </main>

  <script type="module">
    const error = document.getElementById('login-error')

    // Show an error if Google sign-in bounced us back
    const params = new URLSearchParams(location.search)
    if (params.get('error') === 'denied') {
      error.textContent = 'That Google account isn’t on the list of allowed users.'
      error.hidden = false
    } else if (params.get('error') === 'auth') {
      error.textContent = 'Sign-in failed. Please try again.'
      error.hidden = false
    }

    // Show whichever sign-in methods are available
    try {
      const methods = await (await fetch('/api/auth/methods')).json()
      if (methods.google) document.getElementById('google-btn').hidden = false
      if (methods.password) {
        document.getElementById('login-form').hidden = false
        if (methods.google) document.getElementById('or-divider').hidden = false
        else document.getElementById('password').focus()
      }
    } catch {}

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault()
      error.hidden = true
      const password = document.getElementById('password').value
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      })
      if (res.ok) {
        window.location.href = '/admin/'
      } else {
        error.textContent = 'Incorrect password.'
        error.hidden = false
      }
    })
  </script>
</body>
</html>
